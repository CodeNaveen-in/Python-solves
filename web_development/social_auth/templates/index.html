{% extends "base.html" %}
{% block content %}
<h2>Welcome{% if user %}, {{ user }}{% endif %}!</h2>
{% if not user %}
<a href="{{ url_for('login') }}" class="btn btn-primary">Login</a>
<a href="{{ url_for('register') }}" class="btn btn-success">Register</a>
{% else %}
<a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
{% endif %}
{% endblock %}
