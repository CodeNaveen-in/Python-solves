{% extends "base.html" %}
{% block content %}
<form method="POST">
    <div class="mb-3"><label>Title</label><input name="title" class="form-control" required></div>
    <div class="mb-3"><label>Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
    <div class="mb-3"><label>Rating</label><input name="rating" class="form-control" type="number" step="0.1" required></div>
    <div class="mb-3"><label>Poster URL</label><input name="poster_url" class="form-control" required></div>
    <button type="submit" class="btn btn-success">Add Movie</button>
</form>
{% endblock %}
