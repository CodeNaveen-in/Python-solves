{% extends "base.html" %}
{% block content %}
<a href="{{ url_for('add') }}" class="btn btn-success mb-3">➕ Add Movie</a>
<div class="row">
    {% for movie in movies %}
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <img src="{{ movie[4] }}" class="card-img-top" alt="{{ movie[1] }}">
            <div class="card-body">
                <h5 class="card-title">{{ movie[1] }}</h5>
                <p class="card-text">{{ movie[2] }}</p>
                <p><strong>⭐ Rating:</strong> {{ movie[3] }}</p>
                <a href="{{ url_for('edit', movie_id=movie[0]) }}" class="btn btn-primary btn-sm">Edit</a>
                <a href="{{ url_for('delete', movie_id=movie[0]) }}" class="btn btn-danger btn-sm">Delete</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
