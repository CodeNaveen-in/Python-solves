{% extends "base.html" %}
{% block content %}
<form method="POST">
    <p><strong>{{ book[1] }}</strong> by {{ book[2] }}</p>
    <div class="mb-3"><label>New Rating</label><input name="rating" class="form-control" type="number" step="0.1" value="{{ book[3] }}" required></div>
    <button type="submit" class="btn btn-primary">Update</button>
</form>
{% endblock %}
